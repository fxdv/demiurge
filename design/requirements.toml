# --- Phase 6: live migration --------------------------------------------

[[requirement]]
id = "DEMI-MIG-SUBITL"
kind = "normative"
status = "implemented"
phase = 6
section = "8.5"
summary = "Migration cutover never commits unless est <= eps * ITL budget."
requires_test = true
tests = [
    "migration_aborts_when_over_budget",
    "budget_uses_canonical_epsilon",
    "quiesce_one_step_accumulates_estimated_stall",
    "record_migration_stall_tracks_estimated_vs_measured",
    "migration_commit_transfers_reservation",
    "migration_abort_restores_source_reservation",
    "ledger_consistent_after_commit_and_abort",
]

# --- Phase 7: multi-tenancy & cache security ----------------------------

[[requirement]]
id = "DEMI-S1-DOMAIN"
kind = "normative"
status = "implemented"
phase = 7
section = "6.1"
summary = "A non-member never obtains a shared cache-domain key."
requires_test = true
tests = [
    "non_member_never_resolves_shared_key",
    "member_with_matching_template_resolves_shared_key",
    "template_mismatch_no_shared_key",
    "non_member_isolated_under_fuzz",
    "tenant_private_warmth_not_shared_across_tenants",
    "shared_group_members_share_salted_warmth",
    "live_tcp_path_gates_warmth_by_identity",
]

# --- Phase 8: learned corrector graduation --------------------------------

[[requirement]]
id = "DEMI-CORR-GRAD"
kind = "normative"
status = "implemented"
phase = 8
section = "7"
summary = "Corrector graduates shadow to prod only without clamp or C>0 violations."
requires_test = true
tests = [
    "corrector_graduation_requires_zero_violations_and_goodput",
    "is_clamp_saturated_covers_boundary_and_invalid_values",
    "healthy_window_promotes_shadow_to_canary",
    "two_healthy_windows_reach_production",
    "production_holds_under_continued_health",
    "violation_during_canary_rolls_back_to_shadow",
    "violation_during_production_rolls_back_to_shadow",
    "saturated_delta_blocks_promotion_even_with_zero_violations",
    "saturation_in_canary_rolls_back_even_though_goodput_looks_fine",
    "hold_at_shadow_is_not_reported_as_rollback",
]
