# design/requirements.toml — registry of normative/structural claims.
#
# Each `id` must be referenced verbatim from the spec (\req{ID}) and/or code
# ([ID]). `status` is "implemented" (backed by code + named tests) or "intended"
# (design intent, no code yet). `phase` ties the requirement to ROADMAP.md.
# `section` must match numbered headings in spec/demiurge.tex.

# --- Phase 0: foundations (shipped) ---------------------------------------

[[requirement]]
id = "DEMI-COST-POS"
kind = "normative"
status = "implemented"
phase = 0
section = "4.3, 4.5"
summary = "Cost is strictly positive by construction (log-space representation)."
requires_test = true
tests = ["cost_strictly_positive", "cost_log_is_finite_at_extremes"]

[[requirement]]
id = "DEMI-CORR-CLAMP"
kind = "normative"
status = "implemented"
phase = 0
section = "4.5, 7"
summary = "Corrector multiplier is bounded to [1-alpha, 1+alpha]."
requires_test = true
tests = ["corrector_multiplier_bounded"]

[[requirement]]
id = "DEMI-FAIL-EXPENSIVE"
kind = "normative"
status = "implemented"
phase = 0
section = "4.5"
summary = "Invalid signals saturate toward expensive; never cheapen a target."
requires_test = true
tests = [
  "invalid_signal_never_cheapens",
  "dynamo_nan_overlap_poisons_rank_demiurge_stays_finite",
  "service_cost_broken_signals_never_undercut_healthy",
]

[[requirement]]
id = "DEMI-ROUTE-MINCOST"
kind = "normative"
status = "implemented"
phase = 0
section = "8.1"
summary = "The router forwards to the minimum-cost backend in the chosen pool."
requires_test = true
tests = ["selects_min_cost_backend", "forwards_to_cheapest_backend"]

# --- Phase 1: non-blocking routing loop -----------------------------------

[[requirement]]
id = "ALG-ROUTE"
kind = "structural"
status = "implemented"
phase = 1
section = "8.2"
summary = "Route admits, dispatches prefill asynchronously, and returns immediately."
requires_test = true
tests = ["route_returns_before_prefill_complete", "accept_latency_decoupled_from_prefill_duration_under_load"]

[[requirement]]
id = "DEMI-SHORT-FASTPATH"
kind = "normative"
status = "implemented"
phase = 1
section = "8.2"
summary = "Short contexts use colocated routing unless warmth override applies."
requires_test = true
tests = ["short_context_uses_colocated_path"]

# --- Phase 2: KV hand-off & memory barriers -------------------------------

[[requirement]]
id = "DEMI-KV-HANDOFF"
kind = "normative"
status = "implemented"
phase = 2
section = "8.3"
summary = "Decode placement never proceeds without a valid KV hand-off handle."
requires_test = true
tests = [
    "decode_waits_for_handoff",
    "disaggregated_decode_requires_handoff",
    "harden_kv_admit_rejected_returns_503",
]

[[requirement]]
id = "DEMI-KV-OVERHEAD"
kind = "normative"
status = "implemented"
phase = 2
section = "5"
summary = "KV reservation includes metadata and fragmentation, not raw token bytes."
requires_test = true
tests = ["kv_reserved_includes_overhead"]

[[requirement]]
id = "DEMI-BARRIER-PHI"
kind = "normative"
status = "implemented"
phase = 2
section = "5"
summary = "Fleet aggregate KV reservation; not per-request p90 sum."
requires_test = true
tests = ["phi_uses_fleet_aggregate_not_p90_sum", "handoff_burst_no_oom", "phi_barrier_raises_decode_cost_under_pressure"]

[[requirement]]
id = "DEMI-KV-RELEASE"
kind = "normative"
status = "implemented"
phase = 2
section = "5"
summary = "Session end, abort, or TTL always releases KV reservation."
requires_test = true
tests = ["reservation_released_on_session_end"]

[[requirement]]
id = "DEMI-KV-TRANSFER-TELEM"
kind = "structural"
status = "implemented"
phase = 2
section = "8.3"
summary = "Hand-off transfer cost logged as p50/p99 bytes and wall time."
requires_test = true
tests = ["handoff_transfer_telemetry_p50_p99", "disaggregated_decode_requires_handoff"]

# --- Phase 3: state plane -------------------------------------------------

[[requirement]]
id = "DEMI-WARM-DISCOUNT"
kind = "normative"
status = "implemented"
phase = 3
section = "state"
summary = "Warmth hit applies a bounded discount; miss applies none."
requires_test = true
tests = [
  "warmth_discount_bounded",
  "warmth_aware_routing_improves_hit_ratio",
  "warmth_override_forces_disaggregated_path",
  "warmth_respects_rho_max_envelope",
  "demiurge_rho_max_caps_warmth_unlike_unbounded_overlap",
]

[[requirement]]
id = "DEMI-STATE-AP"
kind = "normative"
status = "implemented"
phase = 3
section = "state"
summary = "State plane is AP; stale warmth causes miss only, never crash."
requires_test = true
tests = ["stale_warmth_miss_only", "gossip_partition_heals_without_control_plane"]

# --- Phase 4: control plane & pairing -------------------------------------

[[requirement]]
id = "DEMI-PAIR-GREEDY"
kind = "normative"
status = "implemented"
phase = 4
section = "pairing"
summary = "Greedy pf-then-dc pairing; documented approximation to joint objective."
requires_test = true
tests = [
    "greedy_pairing_prefill_first",
    "pairing_regret_within_budget",
    "greedy_decode_prefers_colocated_label_over_cheaper_remote",
]

[[requirement]]
id = "DEMI-POOL-RATIO"
kind = "normative"
status = "implemented"
phase = 4
section = "control"
summary = "Pool rebalancer adjusts capacity share with hysteresis; shadow by default."
requires_test = true
tests = ["rebalance_respects_hysteresis_and_cooldown", "shadow_mode_never_actuates"]

# --- Phase 5: data plane hardening ----------------------------------------

[[requirement]]
id = "DEMI-DP-RCU"
kind = "normative"
status = "implemented"
phase = 5
section = "dataplane"
summary = "Data plane serves last RCU snapshot; never blocks on control plane."
requires_test = true
tests = [
    "rcu_read_never_blocks_under_publish",
    "rcu_hot_read_under_cp_stall",
    "rcu_read_p99_unchanged_under_slow_publish",
    "router_exposes_dataplane_pi",
]

[[requirement]]
id = "DEMI-XDP-SHED"
kind = "normative"
status = "implemented"
phase = 5
section = "dataplane"
summary = "XDP sheds overload before L7 on bucket exhaustion."
requires_test = true
tests = [
    "admit_bucket_sheds_when_exhausted",
    "admit_bucket_sheds_on_live_router",
    "userspace_admit_limits_concurrent_connections",
    "harden_tcp_503_on_admit_exhaust",
    "harden_admit_conn_single_guard_path",
    "bpf_model_never_over_admits_concurrently",
    "xdp_admit_shed_sheds_new_syns_when_exhausted",
    "xdp_admit_shed_passes_non_syn_traffic",
    "xdp_admit_shed_refills_tokens_in_kernel",
]

