# design/demiurge.params.toml — the single source of truth for every tunable.
#
# Edit values here, then run `cargo xtask gen` to project them into:
#   - crates/demiurge-cost/src/generated_params.rs  (the binary's constants)
#   - spec/generated/params_table.tex               (the spec's table)
# CI fails if the generated files drift from this file.
#
# Groups for not-yet-built subsystems are design-intent placeholders until their
# roadmap phase lands (see ROADMAP.md).

[cache]
block_tokens = 256
chbl_load_factor_c = 1.25
cuckoo_max_loadfactor = 0.90

[corrector]
alpha = 0.20

[migration]
itl_budget_fraction_eps = 0.5

[telemetry]
gossip_interval_ms = 100
frame_rate_hz = 50
free_block_interrupt_pct = 20

# Phase 1 — short-context fast path (shipped)
[routing]
short_context_tokens = 512
short_context_warmth_override = 0.15
# Cross-node KV transfer barrier when pf label != dc label (Phase 4 pairing).
transfer_penalty = 1.05

# Phase 2 — KV overhead accounting (shipped)
[kv]
metadata_overhead_fraction = 0.08
fragmentation_slack = 0.05
abandoned_session_ttl_s = 300

# Phase 4 — dynamic pool rebalancing (shipped shadow; actuation Phase 5)
[pool]
rebalance_hysteresis = 0.10
rebalance_cooldown_s = 300
weight_queue = 0.35
weight_kv = 0.30
weight_slo = 0.35
# When true, rebalancer may actuate π and publish to the data-plane RCU table.
actuation_enabled = false

# Phase 5 — data plane hardening (in progress)
[dataplane]
admit_burst = 4096
rcu_stale_alert_ms = 500
