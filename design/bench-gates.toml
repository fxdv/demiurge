# design/bench-gates.toml — CPU performance gates for hot-path code.
#
# Thresholds are median nanoseconds per operation measured in `--release` on a
# quiet machine. CI multiplies by `settings.ci_slack` to absorb runner jitter.
#
# Run locally:  cargo xtask bench-gate
# Tune limits:   cargo xtask bench-probe   (reports floor/median/p95 + suggestions)
# Visualize:     cargo xtask bench-flame   (flame SVG + headroom trends)
#
# Tighten a gate only when deliberately optimizing that path; loosening requires
# justification in the PR (regressions are not free).
#
# Optional `parent = "BENCH-..."` declares the enclosing hot-path gate; gates
# without a parent are roots. `bench-flame` renders this call structure as a
# flame graph (nesting = who invokes whom; each box is labeled with its own
# independently measured median, so widths are log-scaled cost, not additive
# time attribution). Unknown parents and cycles are rejected.

[settings]
# Multiplier applied to max_median_ns when CI=true.
ci_slack = 2.0
# Number of timed samples; median is taken.
samples = 5

# --- Phase 0: cost algebra + router selection --------------------------------

[[gate]]
id = "BENCH-COMPOSE-8"
phase = 0
summary = "compose() with 4 barriers + 2 discounts + identity corrector"
parent = "BENCH-SELECT-64"
warmup_iters = 10_000
bench_iters = 100_000
max_median_ns = 50

[[gate]]
id = "BENCH-SELECT-64"
phase = 0
summary = "select() minimum-cost pick over 64 backends (cost recomputed each pick)"
parent = "BENCH-ROUTE-DISPATCH"
warmup_iters = 1_000
bench_iters = 10_000
max_median_ns = 1_000

[[gate]]
id = "BENCH-BACKEND-COST"
phase = 0
summary = "Backend::cost() — single target load signal"
parent = "BENCH-SELECT-64"
warmup_iters = 10_000
bench_iters = 100_000
max_median_ns = 8

# --- Phase 1: route classification + async dispatch ----------------------------

[[gate]]
id = "BENCH-CLASSIFY"
phase = 1
summary = "route() — HTTP head parse + fast-path / disaggregated classification"
warmup_iters = 5_000
bench_iters = 50_000
max_median_ns = 350

[[gate]]
id = "BENCH-ROUTE-DISPATCH"
phase = 1
summary = "route() disaggregated path — RequestId alloc + admission (no I/O)"
warmup_iters = 5_000
bench_iters = 50_000
max_median_ns = 350

# --- Phase 2: KV reservation + Φ barrier ---------------------------------------

[[gate]]
id = "BENCH-KV-RESERVE"
phase = 2
summary = "kv_breakdown() + phi_barrier_marginal() hot path"
parent = "BENCH-ROUTE-DISPATCH"
warmup_iters = 5_000
bench_iters = 50_000
max_median_ns = 200

# --- Phase 3: warmth lookup ---------------------------------------------------

[[gate]]
id = "BENCH-WARM-LOOKUP"
phase = 3
summary = "WarmthMap hit_strength probe over 16 block keys"
parent = "BENCH-SELECT-64"
warmup_iters = 5_000
bench_iters = 50_000
max_median_ns = 500

# --- Phase 4: greedy pairing + pool rebalancer --------------------------------

[[gate]]
id = "BENCH-PAIR-GREEDY"
phase = 4
summary = "Greedy pf-then-dc pair selection (8×8 pools)"
warmup_iters = 2_000
bench_iters = 20_000
max_median_ns = 5_000

[[gate]]
id = "BENCH-REBALANCE"
phase = 4
summary = "Pool rebalancer π* computation + hysteresis check"
warmup_iters = 5_000
bench_iters = 50_000
max_median_ns = 800

# --- Phase 5: RCU snapshot read ------------------------------------------------

[[gate]]
id = "BENCH-RCU-SNAPSHOT"
phase = 5
summary = "RcuRoutingTable::read_pi hot path (lock-free Arc clone)"
parent = "BENCH-IOURING-FWD"
warmup_iters = 5_000
bench_iters = 50_000
max_median_ns = 50

# --- Phase 5+ (Track B): io_uring forward path -------------------------------

[[gate]]
id = "BENCH-IOURING-FWD"
phase = 5
summary = "IoUringForwarder RCU read + io_uring NOP submit/wait (reused ring; Linux)"
warmup_iters = 2_000
bench_iters = 20_000
max_median_ns = 1_500
