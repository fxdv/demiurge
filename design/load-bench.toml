# design/load-bench.toml — local end-to-end load scenarios for demiurge-router.
#
# Run:  ./scripts/load-bench.sh
#       ./scripts/load-stress.sh   (strict heavy stress — local only, not in CI)
#       (or: cargo xtask load-bench && cargo xtask load-report)
#
# Local full suite: ./scripts/load-bench.sh
# Real stress:      ./scripts/load-stress.sh  (stress=true scenarios, zero errors)
# CI regression: gate.sh and .github/workflows/ci.yml run `load-bench --ci`.
# Optional soft gates (max_p99_ms): advisory on full runs; enforced with `--ci`.

[settings]
report_dir = "target/load-bench"
warmup_requests = 16
startup_delay_ms = 250
# Pause between isolated stress subprocesses (OS ephemeral-port recovery).
stress_recovery_ms = 30000
# When true, max_p99_ms violations fail the bench step (local full runs only).
gate_strict = false

# --- CI regression (load-bench --ci) ----------------------------------------

[[scenario]]
id = "LOAD-CI-SMOKE"
ci = true
summary = "CI smoke: two-pool routing, bounded p99, zero errors"
backends = 2
decode_backends = 1
base_cost_seconds = 0.01
cost_step_seconds = 0.01
backend_delay_us = 0
concurrency = 8
requests_per_worker = 25
prefill_fraction = 0.5
max_p99_ms = 500.0

# --- Local scenarios (./scripts/load-bench.sh) ------------------------------

[[scenario]]
id = "LOAD-STEADY-PREFILL"
summary = "Sustained prefill GETs, 4-backend pool, min-cost selection"
backends = 4
base_cost_seconds = 0.01
cost_step_seconds = 0.005
backend_delay_us = 0
concurrency = 16
requests_per_worker = 50
# Soft local gate (optional). Comment out to disable.
max_p99_ms = 100.0

[[scenario]]
id = "LOAD-MIXED-PHASE"
summary = "70% prefill / 30% decode classification + routing"
backends = 3
decode_backends = 1
base_cost_seconds = 0.01
cost_step_seconds = 0.003
backend_delay_us = 50
concurrency = 24
requests_per_worker = 80
prefill_fraction = 0.7
max_p99_ms = 150.0

# --- Thin-place scouts + P2 KV burst (local only) ---------------------------

[[scenario]]
id = "LOAD-KV-BURST"
summary = "P2: 10× KV budget, long disagg + hand-off headers, zero OOM, bounded graceful rejects"
backends = 2
decode_backends = 2
use_kv_pool = true
prefill_kv_headers = true
request_style = "long_tokens"
long_prompt_tokens = 2048
bytes_per_token = 128
decode_capacity_bytes = 2_962_230
base_cost_seconds = 0.01
cost_step_seconds = 0.005
backend_delay_us = 0
concurrency = 12
requests_per_worker = 4
max_kv_admit_rejects = 6
max_p99_ms = 150.0
isolate_recovery = true

[[scenario]]
id = "LOAD-LARGE-POOL"
summary = "Thin place: select() over 64 backends (colocated fast path)"
backends = 64
request_style = "short_tokens"
base_cost_seconds = 0.01
cost_step_seconds = 0.0005
backend_delay_us = 0
concurrency = 16
requests_per_worker = 25
max_p99_ms = 30.0

[[scenario]]
id = "LOAD-CLASSIFY-MIX"
summary = "Thin place: mixed short/long token headers + KV hand-off path"
backends = 4
decode_backends = 2
use_kv_pool = true
prefill_kv_headers = true
request_style = "mixed_tokens"
long_prompt_tokens = 2048
bytes_per_token = 128
decode_capacity_bytes = 50_000_000
base_cost_seconds = 0.01
cost_step_seconds = 0.003
backend_delay_us = 0
concurrency = 16
requests_per_worker = 30
max_p99_ms = 80.0

[[scenario]]
id = "LOAD-DISAGG-CHAIN"
summary = "Thin place: full disagg chain (prefill I/O + hand-off + decode pick)"
backends = 3
decode_backends = 3
use_kv_pool = true
prefill_kv_headers = true
request_style = "long_tokens"
long_prompt_tokens = 2048
bytes_per_token = 128
decode_capacity_bytes = 50_000_000
base_cost_seconds = 0.01
cost_step_seconds = 0.002
backend_delay_us = 100
concurrency = 12
requests_per_worker = 15
max_p99_ms = 120.0

[[scenario]]
id = "LOAD-P1-ACCEPT-DECOUPLE"
summary = "P1 exit: admit+dispatch p99 invariant to 50× prefill backend delay"
measure = "admit_decouple"
backends = 2
decode_backends = 2
base_cost_seconds = 0.01
cost_step_seconds = 0.002
request_style = "long_tokens"
long_prompt_tokens = 2048
backend_delay_us = 500
prefill_delay_sweep_us = [500, 25000]
max_accept_p99_ratio = 8.0
concurrency = 16
requests_per_worker = 50
max_p99_ms = 50.0

[[scenario]]
id = "LOAD-HOT-SPOT"
summary = "Skewed pool (1 cheap + 3 dear) under high concurrency (run last — heavy TCP churn)"
backends = 4
base_cost_seconds = 0.005
cost_step_seconds = 0.25
backend_delay_us = 0
concurrency = 24
requests_per_worker = 40
max_p99_ms = 200.0
isolate_recovery = true

[[scenario]]
id = "LOAD-PAIR-KV-PRESSURE"
summary = "P4 pairing under tight KV cap — paired labels, graceful rejects, no OOM"
backends = 4
decode_backends = 4
paired_labels = true
base_cost_seconds = 0.01
cost_step_seconds = 0.002
use_kv_pool = true
prefill_kv_headers = true
request_style = "long_tokens"
long_prompt_tokens = 2048
bytes_per_token = 128
decode_capacity_bytes = 4_500_000
concurrency = 12
requests_per_worker = 16
max_kv_admit_rejects = 48
max_p99_ms = 150.0
isolate_recovery = true

[[scenario]]
id = "LOAD-STEP-ACTUATE"
summary = "P5 step-load: decode-heavy then prefill-heavy; actuated π tracks prefill window"
rebalancer_actuation = true
backends = 4
decode_backends = 2
base_cost_seconds = 0.01
cost_step_seconds = 0.002
backend_delay_us = 50
concurrency = 16
requests_per_worker = 40
request_style = "path"
long_prompt_tokens = 1024
step_prefill_fraction = [0.5, 1.0]
step_request_style = ["path", "long_tokens"]
min_dataplane_pi = 0.55
max_p99_ms = 200.0
isolate_recovery = true

# --- Track B kernel dataplane (Linux; LOAD-TRACK-B-KERNEL needs root) ---------

[[scenario]]
id = "LOAD-TRACK-B-IOURING"
summary = "Track B: io_uring production TCP proxy under concurrent load"
io_uring = true
linux_only = true
backends = 4
decode_backends = 2
base_cost_seconds = 0.01
cost_step_seconds = 0.002
backend_delay_us = 25
concurrency = 16
requests_per_worker = 40
request_style = "mixed_tokens"
long_prompt_tokens = 512
max_p99_ms = 250.0
isolate_recovery = true

[[scenario]]
id = "LOAD-TRACK-B-KERNEL"
summary = "Track B: io_uring + kernel XDP admit on veth under concurrent TCP (root)"
optional = true
track_b_kernel = true
admit_mode = "kernel_xdp"
io_uring = true
linux_only = true
backends = 2
decode_backends = 2
base_cost_seconds = 0.01
cost_step_seconds = 0.002
backend_delay_us = 25
concurrency = 12
requests_per_worker = 30
request_style = "path"
max_p99_ms = 300.0
isolate_recovery = true

# --- Real stress (load-bench --stress / ./scripts/load-stress.sh) ------------
# Excluded from ./scripts/load-bench.sh. Strict gates: zero errors + p99.
# Order matters: heaviest KV/disagg first while ports are fresh; flood last.

[[scenario]]
id = "LOAD-STRESS-REAL"
stress = true
summary = "Stress I (THE REAL ONE): 5k omni — mixed + KV + skew + 4096-token context"
backends = 8
decode_backends = 4
use_kv_pool = true
prefill_kv_headers = true
request_style = "mixed_tokens"
long_prompt_tokens = 4096
bytes_per_token = 128
decode_capacity_bytes = 120_000_000
base_cost_seconds = 0.005
cost_step_seconds = 0.08
backend_delay_us = 100
concurrency = 25
requests_per_worker = 200
max_inflight = 10
max_p99_ms = 5000.0

[[scenario]]
id = "LOAD-STRESS-KV-ARMY"
stress = true
summary = "Stress II: 4.8k mixed disagg + KV hand-off"
backends = 6
decode_backends = 6
use_kv_pool = true
prefill_kv_headers = true
request_style = "mixed_tokens"
long_prompt_tokens = 2048
bytes_per_token = 128
decode_capacity_bytes = 80_000_000
base_cost_seconds = 0.01
cost_step_seconds = 0.002
backend_delay_us = 50
concurrency = 24
requests_per_worker = 200
max_inflight = 12
max_p99_ms = 3000.0

[[scenario]]
id = "LOAD-STRESS-FLOOD"
stress = true
summary = "Stress III: 1.8k colocated flood (capped in-flight, runs last)"
backends = 12
base_cost_seconds = 0.01
cost_step_seconds = 0.002
backend_delay_us = 50
concurrency = 12
requests_per_worker = 150
max_inflight = 6
max_p99_ms = 2000.0
