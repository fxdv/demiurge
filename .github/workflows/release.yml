name: release

# Manual semver/tag release (Linux). macOS artifacts: ./scripts/publish.sh --github <tag> locally.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0-p6)"
        required: true
      skip_pre_release:
        description: "Skip pre-release (pack only — prior green run required)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Pre-release validation
        if: ${{ !inputs.skip_pre_release }}
        run: |
          mkdir -p target/release-artifacts
          bash ./scripts/pre-release.sh 2>&1 | tee target/release-artifacts/pre-release.log

      - name: Build publish artifact
        run: bash ./scripts/publish.sh --skip-pre-release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source target/release-artifacts/publish.env
          VERSION="$(grep '^version' crates/demiurge-router/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          COMMIT="$(git rev-parse --short HEAD)"
          gh release create "${{ inputs.tag }}" \
            --title "Demiurge ${VERSION} — P5 proof (${COMMIT})" \
            --notes-file "$STAGING/RELEASE-one-pager.md"
          bash ./scripts/gh-release-upload.sh "${{ inputs.tag }}"
