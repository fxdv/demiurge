name: spec

on:
  push:
    branches: [main]
    paths: ["spec/**", "design/**", ".github/workflows/spec.yml"]
  pull_request:
    paths: ["spec/**", "design/**", ".github/workflows/spec.yml"]

# Build the design document itself, after regenerating its inputs, so the PDF
# is always consistent with the canonical parameters and requirements.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Regenerate spec inputs
        run: cargo xtask gen

      - name: Compile spec
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: spec
          root_file: demiurge.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: demiurge-spec
          path: spec/demiurge.pdf
          if-no-files-found: error
