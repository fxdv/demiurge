name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --release --workspace

      - name: Verify shipped binaries
        run: |
          test -x target/release/demiurge-router
          test -x target/release/xtask

  quality:
    name: Lint & test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

  regression:
    name: Regression
    needs: build
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --release --workspace

      - name: CPU bench gates (hot-path ns/op)
        run: cargo run --release -q --package xtask -- bench-gate

      - name: Load smoke regression (TCP end-to-end)
        run: cargo run --release -q --package xtask -- load-bench --ci
