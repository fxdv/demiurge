name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/gate-reusable.yml
    with:
      phase: quality

  regression:
    name: Regression
    needs: quality
    uses: ./.github/workflows/gate-reusable.yml
    with:
      phase: regression
      skip_release_build: true
