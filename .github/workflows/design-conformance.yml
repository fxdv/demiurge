name: design-conformance

on:
  push:
    branches: [main]
  pull_request:

# The headline gate: the spec is the contract, and these checks prove the code
# still honors it. Drift in generated artifacts or a broken spec/code/test link
# fails the build.
jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Regenerate artifacts and fail on drift
        run: |
          cargo xtask gen
          if ! git diff --exit-code -- spec/generated crates/demiurge-cost/src/generated_params.rs; then
            echo "::error::Generated artifacts are stale. Run 'cargo xtask gen' and commit the result."
            exit 1
          fi

      - name: Traceability lint (spec <-> code <-> test)
        run: cargo xtask lint
