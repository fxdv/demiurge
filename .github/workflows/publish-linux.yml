name: publish-linux

# Linux release artifact + rolling `linux-nightly` GitHub Release.
# Runs after green Gate on main, weekly (Mon 06:00 UTC), or manual dispatch.

on:
  workflow_run:
    workflows: [Gate]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      skip_pre_release:
        description: "Skip pre-release (pack only — prior green run required)"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-linux
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install document toolchain (product PDF)
        run: sudo apt-get update && sudo apt-get install -y pandoc texlive-xetex

      - name: Pre-release validation
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_pre_release }}
        run: |
          mkdir -p target/release-artifacts target/harden-verify
          bash ./scripts/pre-release.sh 2>&1 | tee target/release-artifacts/pre-release.log
          cp target/load-bench/latest.pseudo target/release-artifacts/load-full.pseudo 2>/dev/null || true
          cp target/load-bench/stress.pseudo target/release-artifacts/stress.pseudo 2>/dev/null || true
          cp target/harden-verify/report.pseudo target/release-artifacts/harden.pseudo 2>/dev/null || true
          cp target/harden-verify/report.md target/release-artifacts/harden.md 2>/dev/null || true
          cp target/reports/sim-latest.pseudo target/release-artifacts/sim.pseudo 2>/dev/null || true

      - name: 'sim L3 docker (optional)'
        continue-on-error: true
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_pre_release }}
        run: ./scripts/linux-vm/docker-track-b.sh sim

      - name: Upload bench + harden reports
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_pre_release }}
        uses: actions/upload-artifact@v4
        with:
          name: demiurge-linux-reports-${{ github.run_id }}
          path: |
            target/release-artifacts/pre-release.log
            target/release-artifacts/load-full.pseudo
            target/release-artifacts/stress.pseudo
            target/release-artifacts/harden.pseudo
            target/release-artifacts/harden.md
            target/release-artifacts/sim.pseudo
            target/load-bench/latest.json
            target/load-bench/stress.json
            target/load-bench/harden.json
            target/load-bench/sim.json
            target/load-bench/sim.pseudo
            target/reports/sim-latest.pseudo
          if-no-files-found: warn
          retention-days: 90

      - name: Build publish artifact
        run: bash ./scripts/publish.sh --skip-pre-release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: demiurge-linux-${{ github.run_id }}
          path: |
            target/release-artifacts/*.tar.gz
            target/release-artifacts/publish.env
          if-no-files-found: error
          retention-days: 90

      - name: Update rolling linux-nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source target/release-artifacts/publish.env
          VERSION="$(grep '^version' crates/demiurge-router/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%d)"
          TAG="linux-nightly"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --prerelease \
              --title "Linux nightly (automated)" \
              --notes "Rolling pre-release: latest green Linux build from \`main\`."
          fi

          bash ./scripts/gh-release-upload.sh "$TAG"

          gh release edit "$TAG" \
            --title "Linux nightly · ${VERSION} · ${DATE} (${COMMIT})" \
            --notes-file "$STAGING/RELEASE-one-pager.md"

          echo "Updated https://github.com/${{ github.repository }}/releases/tag/${TAG}"
