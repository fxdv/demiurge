name: Gate phase

# Reusable gate phases — invoked by gate.yml; mirrors ./scripts/gate.sh --ci-*.
on:
  workflow_call:
    inputs:
      label:
        description: Job title shown in the Actions UI
        required: true
        type: string
      phase:
        description: quality | track-a | track-b
        required: true
        type: string
      skip_release_build:
        description: Skip release build (reuse Verify artifact)
        required: false
        type: boolean
        default: false
      artifact_name:
        description: Release artifact name (Verify uploads, Track A/B download)
        required: false
        type: string
        default: release-target

jobs:
  run:
    name: ${{ inputs.label }}
    runs-on: ubuntu-latest
    env:
      CI: true
      GATE_SKIP_RELEASE_BUILD: ${{ inputs.skip_release_build && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Download release build (artifact reuse)
        if: inputs.skip_release_build
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: target/release

      - name: Install Track B deps
        if: inputs.phase == 'track-b'
        run: sudo apt-get update && sudo apt-get install -y iputils-ping iproute2 clang llvm libbpf-dev

      - name: Run gate phase
        run: ./scripts/gate.sh --ci-${{ inputs.phase }}

      - name: Upload release build
        if: inputs.phase == 'quality'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: target/release/
          retention-days: 1
          if-no-files-found: error

      - name: Upload BPF object
        if: inputs.phase == 'track-b'
        uses: actions/upload-artifact@v4
        with:
          name: demiurge-bpf-${{ github.sha }}
          path: target/bpf/admit_shed.o
          if-no-files-found: error
