name: bpf

on:
  push:
    branches: [main]
    paths:
      - "bpf/**"
      - "scripts/build-bpf.sh"
      - "scripts/xdp-veth-smoke.sh"
      - "scripts/track-b-gate.sh"
      - "scripts/ensure-rust-toolchain.sh"
      - "crates/demiurge-dataplane/**"
      - "crates/demiurge-router/**"
      - "design/bench-gates.toml"
      - "scripts/track-b-verify.sh"
      - ".github/workflows/bpf.yml"
  pull_request:
    paths:
      - "bpf/**"
      - "scripts/build-bpf.sh"
      - "scripts/xdp-veth-smoke.sh"
      - "scripts/track-b-gate.sh"
      - "scripts/ensure-rust-toolchain.sh"
      - "crates/demiurge-dataplane/**"
      - "crates/demiurge-router/**"
      - "design/bench-gates.toml"
      - "scripts/track-b-verify.sh"
      - ".github/workflows/bpf.yml"

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install BPF toolchain
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev iproute2

      - name: Compile XDP admit-shed object
        run: bash ./scripts/build-bpf.sh

      - name: Upload BPF object
        uses: actions/upload-artifact@v4
        with:
          name: demiurge-bpf-${{ github.sha }}
          path: target/bpf/admit_shed.o
          if-no-files-found: error

  xdp-runtime:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install runtime deps
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev iproute2 iputils-ping

      - name: Compile XDP admit-shed object
        run: bash ./scripts/build-bpf.sh

      - name: Track B gate
        run: ./scripts/track-b-gate.sh

      - name: Router Track B tests
        run: cargo test -p demiurge-router --test p5_dataplane
